# Dev stack for nautobot-contract-models.
#
# 4 containers: postgres + redis + nautobot-web + nautobot-worker.
# Reverse-proxied via caddy-docker-proxy on the external `caddy` network.
# Plugin source bind-mounted from ../src for hot-reload (restart web to apply).

x-nautobot-common: &nautobot-common
  build:
    context: ..
    dockerfile: development/Dockerfile
  image: nautobot-contract-models-dev:latest
  restart: unless-stopped
  environment:
    NAUTOBOT_ALLOWED_HOSTS: "${DOMAIN} nautobot-web localhost 127.0.0.1"
    # Use the fully-qualified container name (not the service-relative
    # name "postgres") so we don't get shadowed by a sibling compose
    # project that happens to also have a "postgres" service on the
    # shared `caddy` network. Docker's embedded DNS resolves bare names
    # across all attached networks, so cross-stack collisions are real.
    NAUTOBOT_DB_HOST: nautobot-contract-models-postgres
    NAUTOBOT_DB_PORT: "5432"
    NAUTOBOT_DB_NAME: ${NAUTOBOT_DB_NAME}
    NAUTOBOT_DB_USER: ${NAUTOBOT_DB_USER}
    NAUTOBOT_DB_PASSWORD: ${NAUTOBOT_DB_PASSWORD}
    NAUTOBOT_REDIS_HOST: redis
    NAUTOBOT_REDIS_PORT: "6379"
    NAUTOBOT_REDIS_PASSWORD: ${NAUTOBOT_REDIS_PASSWORD}
    NAUTOBOT_SECRET_KEY: ${NAUTOBOT_SECRET_KEY}
    NAUTOBOT_SUPERUSER_NAME: ${NAUTOBOT_SUPERUSER_NAME}
    NAUTOBOT_SUPERUSER_EMAIL: ${NAUTOBOT_SUPERUSER_EMAIL}
    NAUTOBOT_SUPERUSER_PASSWORD: ${NAUTOBOT_SUPERUSER_PASSWORD}
    NAUTOBOT_SUPERUSER_API_TOKEN: ${NAUTOBOT_SUPERUSER_API_TOKEN}
    NAUTOBOT_CREATE_SUPERUSER: "true"
    PYTHONUNBUFFERED: "1"
  volumes:
    # Custom config (PLUGINS list, PLUGINS_CONFIG, debug toggles).
    - ./nautobot_config/nautobot_config.py:/opt/nautobot/nautobot_config.py:ro
    # Hot-reload our plugin source.
    - ../src:/opt/plugin/src
    # Persistent state.
    - nautobot-static:/opt/nautobot/static
    - nautobot-media:/opt/nautobot/media
    - nautobot-git-repos:/opt/nautobot/git
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NAUTOBOT_DB_NAME}
      POSTGRES_USER: ${NAUTOBOT_DB_USER}
      POSTGRES_PASSWORD: ${NAUTOBOT_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${NAUTOBOT_REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${NAUTOBOT_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  nautobot-web:
    <<: *nautobot-common
    container_name: ${COMPOSE_PROJECT_NAME}-web
    # Override the base image's healthcheck (which runs `nautobot-server
    # health_check` — a management command that cold-boots Django + plugins
    # on every probe, ~5s and ~1 CPU-core). Web container exposes
    # Nautobot's in-process /health/ via the running uWSGI worker, ~50×
    # cheaper. Caddy already reverse-proxies this container, so an
    # unresponsive uWSGI surfaces at the HTTP layer first anyway.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -o /dev/null http://127.0.0.1:8080/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5m
    networks:
      - internal
      - caddy
    labels:
      caddy: ${DOMAIN}
      caddy.reverse_proxy: "{{upstreams 8080}}"
      caddy.encode: "gzip zstd"

  nautobot-worker:
    <<: *nautobot-common
    container_name: ${COMPOSE_PROJECT_NAME}-worker
    entrypoint: ["nautobot-server", "celery", "worker", "-l", "INFO"]
    # Worker has no HTTP server, so we keep the management-command probe
    # — but stretch the interval from the upstream 10s to 60s. Each
    # invocation cold-boots Django (~5s, ~1 CPU-core); 60s is plenty for
    # liveness in a dev stack. 30s timeout absorbs slow boots under load.
    healthcheck:
      test: ["CMD-SHELL", "nautobot-server health_check"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 5m
    networks:
      - internal

volumes:
  postgres-data:
  redis-data:
  nautobot-static:
  nautobot-media:
  nautobot-git-repos:

networks:
  internal:
    driver: bridge
  caddy:
    external: true
